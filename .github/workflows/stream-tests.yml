name: Stream & Server Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  API_LEVEL: 30

jobs:
  unit-tests:
    name: Unit Tests (Server + Stream + Player)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create test server config
        run: |
          mkdir -p app/src/test/resources
          cat > app/src/test/resources/test_server.properties << EOF
          server.url=${{ secrets.TEST_SERVER_URL }}
          server.username=${{ secrets.TEST_SERVER_USER }}
          server.password=${{ secrets.TEST_SERVER_PASS }}
          test.stream.live_id=${{ secrets.TEST_LIVE_STREAM_ID }}
          test.stream.movie_id=${{ secrets.TEST_MOVIE_ID }}
          test.stream.series_episode_id=${{ secrets.TEST_EPISODE_ID }}
          EOF

      - name: Run unit tests
        run: ./gradlew test --continue

      - name: Run server connection tests
        run: ./gradlew testDebugUnitTest --tests "com.bayyari.tv.server.*"

      - name: Run stream tests
        run: ./gradlew testDebugUnitTest --tests "com.bayyari.tv.stream.*"

      - name: Run player unit tests
        run: ./gradlew testDebugUnitTest --tests "com.bayyari.tv.player.*"

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 14

  instrumented-tests:
    name: Instrumented Tests (Android Emulator)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create androidTest assets config
        run: |
          mkdir -p app/src/androidTest/assets
          cat > app/src/androidTest/assets/test_server.properties << EOF
          server.url=${{ secrets.TEST_SERVER_URL }}
          server.username=${{ secrets.TEST_SERVER_USER }}
          server.password=${{ secrets.TEST_SERVER_PASS }}
          test.stream.live_id=${{ secrets.TEST_LIVE_STREAM_ID }}
          test.stream.movie_id=${{ secrets.TEST_MOVIE_ID }}
          test.stream.series_episode_id=${{ secrets.TEST_EPISODE_ID }}
          EOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
          retention-days: 14

  stream-health-check:
    name: Stream Server Health Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run stream reachability tests
        run: |
          ./gradlew testDebugUnitTest \
            --tests "com.bayyari.tv.stream.StreamReachabilityTest" \
            -Dserver.url=${{ secrets.TEST_SERVER_URL }} \
            -Dserver.username=${{ secrets.TEST_SERVER_USER }} \
            -Dserver.password=${{ secrets.TEST_SERVER_PASS }} \
            -Dtest.stream.live_id=${{ secrets.TEST_LIVE_STREAM_ID }} \
            -Dtest.stream.movie_id=${{ secrets.TEST_MOVIE_ID }} \
            -Dtest.stream.series_episode_id=${{ secrets.TEST_EPISODE_ID }} \
            -Dstream.health.enabled=true

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Stream server health check FAILED. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
