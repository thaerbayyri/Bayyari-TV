name: Performance Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-performance-guards:
    name: Unit Performance Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run performance budget tests
        run: ./gradlew testDebugUnitTest --tests "com.bayyari.tv.perf.PerformanceBudgetTest"

  apk-size-budget:
    name: APK Size Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Check APK size
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          SIZE=$(stat -c%s "$APK")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "APK size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 25 ]; then
            echo "::error::APK ${SIZE_MB}MB exceeds 25MB budget"
            exit 1
          fi

  startup-budget:
    name: Startup Time Budget
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Measure fresh cold start
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell pm clear com.bayyari.tv.debug
            TOTAL=0
            for i in 1 2 3 4 5; do
              adb shell am force-stop com.bayyari.tv.debug
              sleep 1
              TIME=$(adb shell am start-activity -W \
                -n com.bayyari.tv.debug/com.bayyari.tv.ui.MainActivity \
                | awk '/TotalTime/ { print $2 }')
              echo "Run $i: ${TIME}ms"
              TOTAL=$((TOTAL + TIME))
            done
            AVG=$((TOTAL / 5))
            echo "Average startup: ${AVG}ms"
            if [ "$AVG" -gt 1500 ]; then
              echo "::error::Startup ${AVG}ms exceeds 1500ms budget"
              exit 1
            fi
